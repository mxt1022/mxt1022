    <linearGradient id="accent"><stop stop-color="#7c5cfc"/><stop offset="1" stop-color="#00d4aa"/></linearGradient>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse"><path d="M28 0H0V28" fill="none" stroke="#8b93b8" stroke-opacity=".07"/></pattern>
